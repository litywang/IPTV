name: IPTV Check

on:
  schedule:
    # 每天早上6点自动运行
    - cron: '0 6 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - master

jobs:
  iptv-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests httpx zhconv tqdm
          pip install m3u8 || true

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Run IPTV check
        run: python IPTV-Apex-dzh.py --no-speed-check
        env:
          TZ: Asia/Shanghai

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live_ok.txt live_ok_fail.txt config.json .iptv_stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: 自动更新检测结果 $(date +'%Y-%m-%d %H:%M')"
          git push 2>/dev/null || echo "无需更新或推送失败"
